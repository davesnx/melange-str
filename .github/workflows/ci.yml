name: CI

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main

env:
  DUNE_PROFILE: release
  OCAMLRUNPARAM: b

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash -xeuo pipefail {0}

jobs:
  build:
    name: Build and test

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
        ocaml-compiler:
          - 5.4.0

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Use OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3.4.5
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          dune-cache: false
          opam-disable-sandboxing: true

      - name: Create npm.exe shim for opam on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nodeDir = (Get-Command node).Source | Split-Path
          $shimSrc = "$env:RUNNER_TEMP\npm-shim.cs"
          Set-Content -Path $shimSrc -Value @'
          using System;
          using System.Diagnostics;
          using System.IO;
          using System.Reflection;
          class NpmShim {
              static int Main(string[] args) {
                  string exeDir = Path.GetDirectoryName(Assembly.GetExecutingAssembly().Location);
                  ProcessStartInfo psi = new ProcessStartInfo();
                  psi.FileName = Path.Combine(exeDir, "npm.cmd");
                  psi.Arguments = String.Join(" ", args);
                  psi.UseShellExecute = false;
                  Process p = Process.Start(psi);
                  p.WaitForExit();
                  return p.ExitCode;
                }
          }
          '@
          & C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe /nologo /out:"$nodeDir\npm.exe" $shimSrc
          & "$nodeDir\npm.exe" --version

      - name: Install opam deps
        run: make install

      - name: Pin dependencies
        run: make pin

      - name: Build
        run: make build

      - name: Check formatting
        run: make format-check

      - name: Run tests
        run: make test

      - name: Install dune-release
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest'
        run: opam install dune-release -y

      - name: Release
        uses: davesnx/dune-release-action@v0.2.14
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest'
        with:
          packages: 'melange-str'
          changelog: './CHANGES.md'
          github-token: ${{ secrets.GH_TOKEN }}
