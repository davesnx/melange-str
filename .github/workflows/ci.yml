name: CI

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main

env:
  DUNE_PROFILE: release
  OCAMLRUNPARAM: b

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash -xeuo pipefail {0}

jobs:
  build:
    name: Build and test

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
        ocaml-compiler:
          - 5.4.0

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Use OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3.4.5
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          dune-cache: false
          opam-disable-sandboxing: true

      - name: Make node available in Cygwin
        if: runner.os == 'Windows'
        run: |
          NODE_DIR=$(cygpath "$RUNNER_TOOL_CACHE/node/$(node --version | sed 's/^v//')/x64")
          ln -sf "$NODE_DIR/node.exe" /usr/local/bin/node
          ln -sf "$NODE_DIR/npm" /usr/local/bin/npm
          ln -sf "$NODE_DIR/npx" /usr/local/bin/npx
          which npm
          npm --version

      - name: Install opam deps
        run: make install

      - name: Pin dependencies
        run: make pin

      - name: Build
        run: make build

      - name: Check formatting
        run: make format-check

      - name: Run tests
        run: make test

      - name: Install dune-release
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest'
        run: opam install dune-release -y

      - name: Release
        uses: davesnx/dune-release-action@v0.2.14
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest'
        with:
          packages: 'melange-str'
          changelog: './CHANGES.md'
          github-token: ${{ secrets.GH_TOKEN }}
